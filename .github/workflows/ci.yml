name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - name: Test Alpine
      run: .github/scripts/test-alpine.sh
    - name: Test Debian
      run: .github/scripts/test-debian.sh
    - name: Test Fedora
      run: .github/scripts/test-fedora.sh
